<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBO 순위표</title>
    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .table th,
      .table td {
        text-align: center;
        vertical-align: middle;
      }
      /* 승률 컬럼 강조 스타일 */
      .winning-rate {
        font-weight: bold;
        background-color: #f0f4f9 !important;
      }
      /* 팀 로고 이미지 스타일 */
      .team-logo {
        width: 26px;
        height: 26px;
        object-fit: contain;
        margin-right: 8px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4 kbo">
      <h3 class="mb-3 font-weight-bold">종합 순위</h3>

      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>순위</th>
            <th>팀</th>
            <th>경기</th>
            <th>승</th>
            <th>무</th>
            <th>패</th>
            <th class="winning-rate">승률</th>
            <th>게임차</th>
            <th>연속</th>
          </tr>
        </thead>
        <tbody id="kboTableBody"></tbody>
      </table>
    </div>

    <script>
      const jsonUrl = "https://prof-jwchi.github.io/kopo-front2026/Json/baseball.json";

      /**
       * 객체 내에서 여러 후보 키(candidate keys)를 순차적으로 검색하여 존재하되 객체가 아닌 '단일 값(기본형)'을 반환하는 안전 탐색 함수
       */
      function getValidValue(item, candidateKeys) {
        if (!item) return '-';

        // 1. item 객체 바로 아래 검색 (단, 객체/배열 형태가 아닌 일반 값만 추출)
        for (const key of candidateKeys) {
          const val = item[key];
          if (val !== undefined && val !== null && typeof val !== 'object') {
            return val;
          }
        }

        // 2. item.rank 객체 내부 검색 (rank가 객체인 경우)
        if (item.rank && typeof item.rank === 'object') {
          for (const key of candidateKeys) {
            const val = item.rank[key];
            if (val !== undefined && val !== null && typeof val !== 'object') {
              return val;
            }
          }
        }

        return '-';
      }

      fetch(jsonUrl)
        .then((response) => response.json())
        .then((data) => {
          const tableBody = document.getElementById("kboTableBody");
          let tableRowsHtml = "";

          data.list.forEach((team) => {
            // 각 속성별 다각도 유연 탐색 (객체 자체 반환 방지 및 순위/경기수/연속 등 정확히 추출)
            const rankVal = getValidValue(team, ['rank', 'rankNo', 'r']);
            const nameVal = getValidValue(team, ['name', 'teamName', 'shortName']);
            const logoUrl = getValidValue(team, ['imageUrl', 'logo', 'emblem']);
            const gameVal = getValidValue(team, ['gameCount', 'game', 'games', 'playCount', 'g']);
            const wonVal = getValidValue(team, ['won', 'win', 'w', 'v']);
            const drawnVal = getValidValue(team, ['drawn', 'draw', 'd', 'tie']);
            const lostVal = getValidValue(team, ['lost', 'loss', 'l', 'defeat']);
            const rateVal = getValidValue(team, ['winningRate', 'winRate', 'wra', 'rate', 'wpct']);
            const gbVal = getValidValue(team, ['gb', 'gameBehind', 'behind', 'gGap']);
            const streakVal = getValidValue(team, ['continueStr', 'result', 'streak', 'continuation', 'state']);

            tableRowsHtml += `
              <tr>
                <td><strong>${rankVal}</strong></td>
                <td class="text-start">
                  ${logoUrl && logoUrl !== '-' ? `<img src="${logoUrl}" alt="${nameVal}" class="team-logo">` : ''}
                  <strong>${nameVal}</strong>
                </td>
                <td>${gameVal}</td>
                <td>${wonVal}</td>
                <td>${drawnVal}</td>
                <td>${lostVal}</td>
                <td class="winning-rate">${rateVal}</td>
                <td>${gbVal}</td>
                <td>${streakVal}</td>
              </tr>
            `;
          });

          tableBody.innerHTML = tableRowsHtml;
        })
        .catch((error) => {
          console.error("JSON 데이터를 가져오는 데 실패했습니다.", error);
        });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
