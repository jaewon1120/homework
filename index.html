<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBO 순위표</title>
    <!-- Bootstrap 5.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .table th,
      .table td {
        text-align: center;
        vertical-align: middle;
      }
      /* 승률 컬럼 강조 스타일 */
      .winning-rate {
        font-weight: bold;
        background-color: #f0f4f9 !important;
      }
      /* 팀 로고 이미지 스타일 */
      .team-logo {
        width: 26px;
        height: 26px;
        object-fit: contain;
        margin-right: 8px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4 kbo">
      <h3 class="mb-3 font-weight-bold">종합 순위</h3>

      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>순위</th>
            <th>팀</th>
            <th>경기</th>
            <th>승</th>
            <th>무</th>
            <th>패</th>
            <th class="winning-rate">승률</th>
            <th>게임차</th>
            <th>연속</th>
          </tr>
        </thead>
        <tbody id="kboTableBody"></tbody>
      </table>
    </div>

    <script>
      const jsonUrl = "https://prof-jwchi.github.io/kopo-front2026/Json/baseball.json";

      fetch(jsonUrl)
        .then((response) => response.json())
        .then((data) => {
          const tableBody = document.getElementById("kboTableBody");
          let tableRowsHtml = "";

          data.list.forEach((team) => {
            const logoUrl = team.imageUrl || "";

            // team.rank 객체 내부의 실제 키값으로 바르게 매핑
            tableRowsHtml += `
              <tr>
                <td><strong>${team.rank.rank}</strong></td>
                <td class="text-start">
                  ${logoUrl ? `<img src="${logoUrl}" alt="${team.name}" class="team-logo">` : ''}
                  <strong>${team.name}</strong>
                </td>
                <td>${team.rank.gameCount}</td>
                <td>${team.rank.won}</td>
                <td>${team.rank.drawn}</td>
                <td>${team.rank.lost}</td>
                <td class="winning-rate">${team.rank.winningRate}</td>
                <td>${team.rank.gb}</td>
                <td>${team.rank.continueStr}</td>
              </tr>
            `;
          });

          tableBody.innerHTML = tableRowsHtml;
        })
        .catch((error) => {
          console.error("JSON 파일을 가져오는 데 실패했습니다.", error);
        });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
