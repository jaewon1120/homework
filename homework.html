    <script>
      const jsonUrl =
        "https://sports.daum.net/prx/hermes/api/team/rank.json?leagueCode=kbo&seasonKey=2026&page=1&pageSize=100";

      // fetch API 로 JSON 파일 가져오기

      fetch(jsonUrl)
        .then((response) => {
          // 응답을 JSON 으로 변환

          return response.json();
        })

        .then((data) => {
          // 변환된 JSON 객체 사용

          const firstRank = data.list[0].rank; // 1위 팀의 rank 값

          const divLi1 = document.getElementById("hero1");

          divLi1.innerHTML = `${firstRank}`;

          console.log(data);

          console.log(data.list[0].name);
        })

        .catch((error) => {
